services:
  postgres:
    image: postgres:16-alpine
    container_name: cupons-amor-db
    environment:
      POSTGRES_USER: amor
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cupons_amor_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amor -d cupons_amor_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: cupons-amor-api
    expose:
      - "8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/cupons_amor_db
      - SPRING_DATASOURCE_USERNAME=amor
      - SPRING_DATASOURCE_PASSWORD=password
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cupons-api.rule=Host(`cupons.seu-dominio.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.cupons-api.entrypoints=websecure"
      - "traefik.http.routers.cupons-api.tls.certresolver=myresolver"
    networks:
      - default
      - traefik-net
    depends_on:
      postgres:
        condition: service_healthy

networks:
  traefik-net:
    external: true

volumes:
  pgdata:
